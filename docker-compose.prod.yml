version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: starburger_db_prod
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME:-starburger}
      POSTGRES_USER: ${DB_USER:-starburger}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-starburger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starburger_network_prod

  # Django Backend Production
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: starburger_backend_prod
    env_file: .env.prod
    environment:
      DEBUG: "False"
      DB_HOST: db
      DB_PORT: 5432
      PYTHONUNBUFFERED: "1"
    volumes:
      - media_data_prod:/app/media
      - static_data_prod:/app/staticfiles
    expose:
      - 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - starburger_network_prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 60 --access-logfile - --error-logfile - star_burger.wsgi:application"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: starburger_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_data_prod:/app/staticfiles:ro
      - media_data_prod:/app/media:ro
      - ./ssl/certbot:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - starburger_network_prod

volumes:
  postgres_data_prod:
    driver: local
  media_data_prod:
    driver: local
  static_data_prod:
    driver: local

networks:
  starburger_network_prod:
    driver: bridge
